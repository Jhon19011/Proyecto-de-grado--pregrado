<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 16px;">

    <!-- HEADER -->
    <div class="text-center mb-4">
      <div class="mb-2">
        <i class="bi bi-box-arrow-in-right" style="font-size: 2.5rem; color: #0d6efd;"></i>
      </div>
      <h4 class="fw-bold mb-0">Iniciar sesión</h4>
      <small class="text-muted">Sistema de inventario químico</small>
    </div>

    <!-- FORM -->
    <form (ngSubmit)="login()">

      <!-- EMAIL -->
      <div class="form-floating mb-3">
        <input 
          type="email"
          class="form-control rounded-pill"
          id="email"
          name="email"
          placeholder="Correo"
          [(ngModel)]="correo"
          required>
        <label for="email">
          <i class="bi bi-envelope me-2"></i>Correo
        </label>
      </div>

      <!-- PASSWORD -->
      <div class="form-floating mb-3">
        <input 
          type="password"
          class="form-control rounded-pill"
          id="password"
          name="password"
          placeholder="Contraseña"
          [(ngModel)]="password"
          required>
        <label for="password">
          <i class="bi bi-lock me-2"></i>Contraseña
        </label>
      </div>

      <!-- RECUPERAR -->
      <div class="text-end mb-3">
        <button 
          type="button" 
          class="btn btn-link p-0 small"
          (click)="router.navigate(['/recuperar'])">
          ¿Olvidaste tu contraseña?
        </button>
      </div>

      <!-- BOTÓN -->
      <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">
        <i class="bi bi-box-arrow-in-right me-1"></i>
        Ingresar
      </button>

    </form>

  </div>

</div>
