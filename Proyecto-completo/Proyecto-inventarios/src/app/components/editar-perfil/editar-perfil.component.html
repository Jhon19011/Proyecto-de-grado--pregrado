<div class="container-fluid py-4 px-5">

  <!-- 🔹 TOP BAR -->
  <div class="card shadow-sm border-0 mb-3">
    <div class="card-body d-flex align-items-center gap-3">

      <button class="btn btn-light btn-sm" (click)="volver()">
        <i class="bi bi-arrow-left"></i>
      </button>

      <div>
        <h5 class="mb-0 fw-bold">Mi perfil</h5>
        <small class="text-muted">Actualiza tu información personal</small>
      </div>

    </div>
  </div>

  <!-- 🔹 PERFIL -->
  <div class="card shadow-sm border-0">
    <div class="card-body">

      <form (ngSubmit)="guardar()" class="form-modern">

        <!-- 🔹 INFO USUARIO -->
        <div class="d-flex align-items-center gap-3 mb-4">
          <div class="profile-avatar">
            <i class="bi bi-person-circle"></i>
          </div>

          <div>
            <h6 class="mb-0 fw-semibold">{{ nombres }} {{ apellidos }}</h6>
            <small class="text-muted">Información del usuario</small>
          </div>
        </div>

        <!-- 🔹 INFORMACIÓN PERSONAL -->
        <h6 class="form-section-title">Información personal</h6>

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Nombres</label>
            <input [(ngModel)]="nombres" name="nombres"
              class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Apellidos</label>
            <input [(ngModel)]="apellidos" name="apellidos"
              class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Correo</label>
            <input type="email" [(ngModel)]="correo" name="correo"
              class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Teléfono</label>
            <input [(ngModel)]="telefono" name="telefono"
              class="form-control">
          </div>

        </div>

        <!-- 🔹 BOTÓN -->
        <div class="mt-4">
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-check-circle me-1"></i>
            Guardar cambios
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
