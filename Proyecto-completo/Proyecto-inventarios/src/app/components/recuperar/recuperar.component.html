<div class="container-fluid vh-100 d-flex justify-content-center align-items-center fondo-login">

  <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 16px;">

    <!-- HEADER -->
    <div class="text-center mb-4">
      <div class="mb-2">
        <i class="bi bi-envelope-paper" style="font-size: 2.5rem; color: #0d6efd;"></i>
      </div>
      <h4 class="fw-bold mb-0">Recuperar contraseña</h4>
      <small class="text-muted">Te enviaremos un enlace de recuperación</small>
    </div>

    <!-- FORM -->
    <form (ngSubmit)="solicitar()">

      <!-- CORREO -->
      <div class="form-floating mb-3">
        <input 
          [(ngModel)]="correo"
          name="correo"
          type="email"
          class="form-control rounded-pill"
          id="correo"
          placeholder="Correo"
          required>
        <label for="correo">
          <i class="bi bi-envelope me-2"></i>Correo
        </label>
      </div>

      <!-- BOTÓN -->
      <button class="btn btn-primary w-100 rounded-pill py-2">
        <i class="bi bi-send me-1"></i>
        Enviar enlace
      </button>

    </form>

  </div>

</div>
