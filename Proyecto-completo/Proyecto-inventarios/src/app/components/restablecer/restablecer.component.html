<div class="container-fluid vh-100 d-flex justify-content-center align-items-center fondo-login">

  <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 16px;">

    <!-- HEADER -->
    <div class="text-center mb-4">
      <div class="mb-2">
        <i class="bi bi-key" style="font-size: 2.5rem; color: #0d6efd;"></i>
      </div>
      <h4 class="fw-bold mb-0">Restablecer contraseña</h4>
      <small class="text-muted">Ingresa tu nueva contraseña</small>
    </div>

    <!-- FORM -->
    <form (ngSubmit)="restablecer()">

      <!-- NUEVA CONTRASEÑA -->
      <div class="form-floating mb-3">
        <input 
          [(ngModel)]="nuevaContrasena"
          type="password"
          name="password"
          class="form-control rounded-pill"
          id="password"
          placeholder="Nueva contraseña"
          required>
        <label for="password">
          <i class="bi bi-lock me-2"></i>Nueva contraseña
        </label>
      </div>

      <!-- BOTÓN -->
      <button class="btn btn-primary w-100 rounded-pill py-2">
        <i class="bi bi-save me-1"></i>
        Guardar contraseña
      </button>

    </form>

  </div>

</div>
